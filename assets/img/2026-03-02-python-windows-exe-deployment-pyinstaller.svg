<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Python Windows executable deployment with PyInstaller</title>
  <desc id="desc">A flow diagram showing Python source files, assets, icon, and spec configuration being bundled by PyInstaller into a dist folder containing a single executable file.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.55" stop-color="#eaf3ff"/>
      <stop offset="1" stop-color="#dfeeff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4aa3ff"/>
      <stop offset="1" stop-color="#1667d9"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7bdc78"/>
      <stop offset="1" stop-color="#26a65b"/>
    </linearGradient>
    <linearGradient id="yellow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd86a"/>
      <stop offset="1" stop-color="#f2aa1f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#1b3d6d" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="18" markerHeight="18" refX="12" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 1 L13 6 L2 11 Z" fill="#2475d1"/>
    </marker>
    <style>
      .label{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:700;fill:#17375f}
      .small{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:600;fill:#4e6685}
      .tiny{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:700;fill:#ffffff}
      .card{fill:#ffffff;stroke:#c9dcf5;stroke-width:3}
      .line{stroke:#2475d1;stroke-width:8;fill:none;stroke-linecap:round;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1320" cy="115" r="190" fill="#cfe5ff" opacity="0.55"/>
  <circle cx="160" cy="780" r="230" fill="#d7ecff" opacity="0.65"/>

  <text x="800" y="92" text-anchor="middle" class="label" font-size="48">Python App to Windows EXE</text>
  <text x="800" y="134" text-anchor="middle" class="small" font-size="24">source files, resources, and options bundled into a deployable dist output</text>

  <g filter="url(#shadow)">
    <rect x="80" y="190" width="360" height="520" rx="30" class="card"/>
    <text x="260" y="245" text-anchor="middle" class="label" font-size="32">Build Inputs</text>

    <g transform="translate(128 292)">
      <rect x="0" y="0" width="120" height="138" rx="18" fill="#f5f9ff" stroke="#b7cbea" stroke-width="3"/>
      <path d="M82 0 L120 38 L82 38 Z" fill="#dceafe"/>
      <rect x="27" y="48" width="66" height="10" rx="5" fill="#4aa3ff"/>
      <rect x="27" y="74" width="50" height="10" rx="5" fill="#87a6cb"/>
      <rect x="27" y="100" width="72" height="10" rx="5" fill="#87a6cb"/>
      <text x="60" y="174" text-anchor="middle" class="small" font-size="22">main.py</text>
    </g>

    <g transform="translate(282 294)">
      <rect x="0" y="30" width="120" height="104" rx="16" fill="url(#yellow)"/>
      <path d="M0 50 Q0 30 20 30 H48 L62 12 H102 Q120 12 120 32 V50 Z" fill="#ffd86a"/>
      <text x="60" y="174" text-anchor="middle" class="small" font-size="22">assets</text>
    </g>

    <g transform="translate(128 510)">
      <rect x="0" y="0" width="120" height="120" rx="26" fill="url(#blue)"/>
      <rect x="30" y="30" width="60" height="60" rx="12" fill="#ffffff" opacity="0.9"/>
      <circle cx="72" cy="48" r="8" fill="#4aa3ff"/>
      <text x="60" y="156" text-anchor="middle" class="small" font-size="22">app.ico</text>
    </g>

    <g transform="translate(282 510)">
      <rect x="0" y="0" width="120" height="120" rx="22" fill="#f5f9ff" stroke="#b7cbea" stroke-width="3"/>
      <circle cx="35" cy="38" r="10" fill="#26a65b"/>
      <circle cx="35" cy="62" r="10" fill="#4aa3ff"/>
      <circle cx="35" cy="86" r="10" fill="#f2aa1f"/>
      <rect x="58" y="32" width="38" height="10" rx="5" fill="#87a6cb"/>
      <rect x="58" y="56" width="48" height="10" rx="5" fill="#87a6cb"/>
      <rect x="58" y="80" width="32" height="10" rx="5" fill="#87a6cb"/>
      <text x="60" y="156" text-anchor="middle" class="small" font-size="22">.spec</text>
    </g>
  </g>

  <path class="line" d="M465 450 C535 450 552 450 625 450"/>

  <g filter="url(#shadow)">
    <rect x="630" y="220" width="340" height="460" rx="34" fill="#17375f"/>
    <rect x="666" y="262" width="268" height="82" rx="22" fill="#244e83"/>
    <text x="800" y="315" text-anchor="middle" class="tiny" font-size="30">PyInstaller</text>

    <g transform="translate(710 390)">
      <circle cx="48" cy="48" r="42" fill="#dbeaff"/>
      <path d="M48 16 L58 34 L78 34 L64 49 L70 70 L48 59 L26 70 L32 49 L18 34 L38 34 Z" fill="#4aa3ff"/>
      <circle cx="142" cy="48" r="42" fill="#dbeaff"/>
      <path d="M112 48 H172 M142 18 V78" stroke="#1667d9" stroke-width="13" stroke-linecap="round"/>
    </g>

    <rect x="690" y="510" width="220" height="78" rx="18" fill="#ffffff" opacity="0.95"/>
    <rect x="722" y="540" width="52" height="14" rx="7" fill="#26a65b"/>
    <rect x="794" y="540" width="84" height="14" rx="7" fill="#87a6cb"/>
    <text x="800" y="632" text-anchor="middle" class="tiny" font-size="24">bundle + onefile</text>
  </g>

  <path class="line" d="M995 450 C1065 450 1082 450 1155 450"/>

  <g filter="url(#shadow)">
    <rect x="1160" y="190" width="360" height="520" rx="30" class="card"/>
    <text x="1340" y="245" text-anchor="middle" class="label" font-size="32">dist Output</text>

    <g transform="translate(1218 315)">
      <rect x="0" y="44" width="244" height="154" rx="24" fill="url(#yellow)"/>
      <path d="M0 70 Q0 44 26 44 H94 L114 20 H212 Q244 20 244 52 V76 Z" fill="#ffd86a"/>
      <rect x="52" y="86" width="140" height="88" rx="24" fill="url(#blue)"/>
      <rect x="88" y="114" width="28" height="28" rx="5" fill="#ffffff" opacity="0.92"/>
      <rect x="128" y="114" width="28" height="28" rx="5" fill="#ffffff" opacity="0.92"/>
      <text x="122" y="245" text-anchor="middle" class="small" font-size="24">app.exe</text>
    </g>

    <g transform="translate(1202 590)">
      <rect x="0" y="0" width="136" height="58" rx="29" fill="url(#green)"/>
      <path d="M42 29 L60 45 L96 15" stroke="#ffffff" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="68" y="94" text-anchor="middle" class="small" font-size="20">no install</text>
    </g>
    <g transform="translate(1366 590)">
      <rect x="0" y="0" width="100" height="58" rx="18" fill="#eaf3ff" stroke="#9bbbe7" stroke-width="3"/>
      <rect x="24" y="18" width="52" height="26" rx="7" fill="#17375f"/>
      <text x="50" y="94" text-anchor="middle" class="small" font-size="20">windowed</text>
    </g>
  </g>
</svg>
