<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Apache and Nginx comparison infographic</title>
  <desc id="desc">A side by side comparison of Apache and Nginx as web servers, with Tomcat as a JSP backend example.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5f7fb"/>
      <stop offset="1" stop-color="#e6eef7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1b2533" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="600" y="68" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700" fill="#142033">Apache vs Nginx</text>
  <text x="600" y="106" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#526274">Web Server Comparison with Tomcat as JSP Backend</text>

  <g filter="url(#shadow)">
    <rect x="80" y="150" width="470" height="370" rx="14" fill="#ffffff"/>
    <rect x="650" y="150" width="470" height="370" rx="14" fill="#ffffff"/>
  </g>

  <text x="315" y="198" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#d35400">Apache</text>
  <text x="885" y="198" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#148f47">Nginx</text>

  <g font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#263548">
    <rect x="138" y="245" width="120" height="54" rx="8" fill="#fff4e7" stroke="#f0b36b"/>
    <text x="198" y="279" text-anchor="middle" font-weight="700">Client</text>
    <path d="M258 272h64" stroke="#9aa7b5" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="322" y="245" width="140" height="54" rx="8" fill="#fff4e7" stroke="#f0b36b"/>
    <text x="392" y="279" text-anchor="middle" font-weight="700">Apache</text>
    <path d="M392 299v54" stroke="#9aa7b5" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="322" y="353" width="140" height="54" rx="8" fill="#fff4e7" stroke="#f0b36b"/>
    <text x="392" y="387" text-anchor="middle" font-weight="700">Tomcat JSP</text>
    <text x="315" y="455" text-anchor="middle" font-size="17" fill="#5b6b7c">Static files, modules, proxy to JSP backend</text>

    <rect x="708" y="245" width="120" height="54" rx="8" fill="#ecfff3" stroke="#76c893"/>
    <text x="768" y="279" text-anchor="middle" font-weight="700">Client</text>
    <path d="M828 272h64" stroke="#9aa7b5" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="892" y="245" width="140" height="54" rx="8" fill="#ecfff3" stroke="#76c893"/>
    <text x="962" y="279" text-anchor="middle" font-weight="700">Nginx</text>
    <path d="M962 299v54" stroke="#9aa7b5" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="892" y="353" width="140" height="54" rx="8" fill="#ecfff3" stroke="#76c893"/>
    <text x="962" y="387" text-anchor="middle" font-weight="700">Tomcat JSP</text>
    <text x="885" y="455" text-anchor="middle" font-size="17" fill="#5b6b7c">Reverse proxy, static files, high concurrency</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#9aa7b5"/>
    </marker>
  </defs>
</svg>
