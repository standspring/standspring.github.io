<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">GoogleTest install and first test workflow infographic</title>
  <desc id="desc">Infographic showing how a C++ project adds GoogleTest, writes a first test, runs CMake and CTest, and expands to assertions and fixtures.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="codePanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#1f334d"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f7fc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#d9e8f5" stroke-width="1" opacity="0.7"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#38536d"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#grid)"/>

  <g transform="translate(70 62)">
    <text x="0" y="0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="44" font-weight="800" fill="#162235">GoogleTest Quick Start</text>
    <text x="2" y="40" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" fill="#53677d">Install GTest, write the first C++ unit test, and run it with CMake/CTest</text>
  </g>

  <g transform="translate(70 154)" filter="url(#shadow)">
    <rect width="322" height="456" rx="8" fill="url(#codePanel)"/>
    <rect width="322" height="44" rx="8" fill="#0b1220"/>
    <circle cx="28" cy="22" r="7" fill="#ef4444"/>
    <circle cx="52" cy="22" r="7" fill="#f59e0b"/>
    <circle cx="76" cy="22" r="7" fill="#22c55e"/>
    <text x="28" y="86" font-family="Consolas, Menlo, monospace" font-size="22" font-weight="700" fill="#f8fafc">CMakeLists.txt</text>
    <text x="28" y="126" font-family="Consolas, Menlo, monospace" font-size="17" fill="#93c5fd">include(FetchContent)</text>
    <text x="28" y="166" font-family="Consolas, Menlo, monospace" font-size="17" fill="#bfdbfe">FetchContent_Declare(</text>
    <text x="52" y="196" font-family="Consolas, Menlo, monospace" font-size="17" fill="#fef3c7">googletest</text>
    <text x="52" y="226" font-family="Consolas, Menlo, monospace" font-size="17" fill="#fef3c7">URL .../main.zip</text>
    <text x="28" y="256" font-family="Consolas, Menlo, monospace" font-size="17" fill="#bfdbfe">)</text>
    <text x="28" y="310" font-family="Consolas, Menlo, monospace" font-size="17" fill="#86efac">enable_testing()</text>
    <text x="28" y="350" font-family="Consolas, Menlo, monospace" font-size="17" fill="#e0f2fe">target_link_libraries(</text>
    <text x="52" y="380" font-family="Consolas, Menlo, monospace" font-size="17" fill="#fca5a5">MyTest gtest_main</text>
    <text x="28" y="410" font-family="Consolas, Menlo, monospace" font-size="17" fill="#e0f2fe">)</text>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(452 166)">
      <rect width="196" height="150" rx="8" fill="url(#card)" stroke="#c7d7e6" stroke-width="2"/>
      <circle cx="98" cy="48" r="28" fill="#dbeafe"/>
      <path d="M82 48 L94 60 L118 36" fill="none" stroke="#2563eb" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="98" y="102" text-anchor="middle" font-size="24" font-weight="800" fill="#162235">Install</text>
      <text x="98" y="128" text-anchor="middle" font-size="15" fill="#5d7185">FetchContent or submodule</text>
    </g>

    <g transform="translate(714 166)">
      <rect width="196" height="150" rx="8" fill="url(#card)" stroke="#c7d7e6" stroke-width="2"/>
      <circle cx="98" cy="48" r="28" fill="#dcfce7"/>
      <text x="98" y="58" text-anchor="middle" font-size="32" font-weight="900" fill="#16a34a">T</text>
      <text x="98" y="102" text-anchor="middle" font-size="24" font-weight="800" fill="#162235">Write Test</text>
      <text x="98" y="128" text-anchor="middle" font-size="15" fill="#5d7185">TEST + EXPECT_EQ</text>
    </g>

    <g transform="translate(976 166)">
      <rect width="196" height="150" rx="8" fill="url(#card)" stroke="#c7d7e6" stroke-width="2"/>
      <circle cx="98" cy="48" r="28" fill="#fef3c7"/>
      <path d="M88 32 L88 66 L120 49 Z" fill="#d97706"/>
      <text x="98" y="102" text-anchor="middle" font-size="24" font-weight="800" fill="#162235">Run</text>
      <text x="98" y="128" text-anchor="middle" font-size="15" fill="#5d7185">cmake --build, ctest</text>
    </g>

    <g transform="translate(452 392)">
      <rect width="220" height="170" rx="8" fill="#ffffff" stroke="#c7d7e6" stroke-width="2"/>
      <rect x="20" y="24" width="180" height="46" rx="8" fill="#eef6ff"/>
      <text x="110" y="54" text-anchor="middle" font-size="20" font-weight="800" fill="#162235">Assertions</text>
      <text x="42" y="104" font-size="18" fill="#26394d">EXPECT_EQ</text>
      <text x="42" y="134" font-size="18" fill="#26394d">ASSERT_TRUE</text>
      <circle cx="184" cy="101" r="9" fill="#22c55e"/>
      <circle cx="184" cy="131" r="9" fill="#22c55e"/>
    </g>

    <g transform="translate(730 392)">
      <rect width="220" height="170" rx="8" fill="#ffffff" stroke="#c7d7e6" stroke-width="2"/>
      <rect x="20" y="24" width="180" height="46" rx="8" fill="#f0fdf4"/>
      <text x="110" y="54" text-anchor="middle" font-size="20" font-weight="800" fill="#162235">Test Fixture</text>
      <text x="110" y="104" text-anchor="middle" font-size="18" fill="#26394d">SetUp()</text>
      <path d="M70 118 H150" stroke="#9fb4c9" stroke-width="3" stroke-linecap="round"/>
      <text x="110" y="146" text-anchor="middle" font-size="18" fill="#26394d">TearDown()</text>
    </g>

    <g transform="translate(1008 392)">
      <rect width="132" height="170" rx="8" fill="#ffffff" stroke="#c7d7e6" stroke-width="2"/>
      <circle cx="66" cy="52" r="28" fill="#dcfce7"/>
      <path d="M48 52 L61 65 L86 38" fill="none" stroke="#16a34a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="66" y="112" text-anchor="middle" font-size="22" font-weight="800" fill="#162235">PASS</text>
      <text x="66" y="140" text-anchor="middle" font-size="15" fill="#5d7185">1 test</text>
    </g>
  </g>

  <g stroke="#38536d" stroke-width="3" stroke-linecap="round" fill="none" marker-end="url(#arrow)">
    <path d="M392 241 H444"/>
    <path d="M652 241 H706"/>
    <path d="M914 241 H968"/>
    <path d="M1074 318 V382"/>
    <path d="M680 477 H722"/>
    <path d="M958 477 H1000"/>
  </g>

  <g transform="translate(462 608)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect width="710" height="46" rx="8" fill="#162235" opacity="0.94"/>
    <text x="34" y="30" font-size="18" font-weight="700" fill="#f8fafc">Core idea:</text>
    <text x="132" y="30" font-size="18" fill="#dbeafe">small deterministic tests make C++ changes safer and easier to refactor</text>
  </g>
</svg>
