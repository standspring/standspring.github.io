<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">국민성장펀드 요약 이미지</title>
  <desc id="desc">국민 모집 6000억 원과 정부 재정 1200억 원이 모펀드와 10개 자펀드를 거쳐 첨단전략산업에 투자되는 구조를 요약한 인포그래픽</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.55" stop-color="#eef7f3"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#243042" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#4b6584"/>
    </marker>
    <style>
      .title { font: 800 48px "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; fill: #172033; }
      .subtitle { font: 500 22px "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; fill: #4c5f76; }
      .label { font: 700 25px "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; fill: #172033; }
      .small { font: 500 18px "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; fill: #516174; }
      .tiny { font: 600 16px "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; fill: #5c6d80; }
      .num { font: 800 36px "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; fill: #126c58; }
      .pill { font: 700 18px "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; fill: #ffffff; }
      .risk { font: 800 20px "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; fill: #9a3412; }
      .stroke { stroke: #d8e2ea; stroke-width: 2; }
      .arrow { stroke: #4b6584; stroke-width: 4; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1040" cy="94" r="86" fill="#bfe7da" opacity="0.42"/>
  <circle cx="130" cy="535" r="120" fill="#ffd8a8" opacity="0.32"/>

  <text x="72" y="82" class="title">국민성장펀드 한눈에 보기</text>
  <text x="74" y="119" class="subtitle">국민 자금과 정부 손실완충으로 첨단전략산업에 장기 투자하는 정책형 공모펀드</text>

  <g filter="url(#shadow)">
    <rect x="70" y="168" width="260" height="162" rx="18" fill="#ffffff" class="stroke"/>
    <rect x="94" y="190" width="104" height="34" rx="17" fill="#2f80ed"/>
    <text x="114" y="214" class="pill">국민 모집</text>
    <text x="94" y="270" class="num">6,000억 원</text>
    <text x="96" y="304" class="small">개인 투자자가 가입</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="372" width="260" height="162" rx="18" fill="#ffffff" class="stroke"/>
    <rect x="94" y="394" width="126" height="34" rx="17" fill="#0f8b6f"/>
    <text x="113" y="418" class="pill">정부 재정</text>
    <text x="94" y="474" class="num">1,200억 원</text>
    <text x="96" y="508" class="small">손실 20% 우선부담</text>
  </g>

  <path d="M345 248 C382 248 390 248 425 248" class="arrow"/>
  <path d="M345 452 C382 452 390 452 425 452" class="arrow"/>

  <g filter="url(#shadow)">
    <rect x="438" y="235" width="286" height="190" rx="22" fill="#ffffff" class="stroke"/>
    <text x="482" y="294" class="label">모펀드</text>
    <text x="482" y="337" class="num">7,200억 원</text>
    <text x="484" y="373" class="small">공모펀드 → 모펀드 → 자펀드</text>
    <rect x="482" y="392" width="178" height="30" rx="15" fill="#eef6ff"/>
    <text x="504" y="413" class="tiny">5년 환매금지형</text>
  </g>

  <path d="M738 330 C772 330 792 330 824 330" class="arrow"/>

  <g filter="url(#shadow)">
    <rect x="838" y="160" width="292" height="340" rx="22" fill="#ffffff" class="stroke"/>
    <text x="884" y="219" class="label">10개 자펀드</text>
    <text x="884" y="256" class="small">첨단전략산업 60% 이상</text>
    <text x="884" y="286" class="small">비상장·기술특례 30% 이상</text>

    <g transform="translate(884 326)">
      <rect x="0" y="0" width="86" height="34" rx="17" fill="#f1f5f9"/>
      <text x="18" y="23" class="tiny">반도체</text>
      <rect x="96" y="0" width="72" height="34" rx="17" fill="#eef7f3"/>
      <text x="123" y="23" class="tiny">AI</text>
      <rect x="178" y="0" width="78" height="34" rx="17" fill="#fff1e3"/>
      <text x="199" y="23" class="tiny">바이오</text>

      <rect x="0" y="47" width="86" height="34" rx="17" fill="#fff1e3"/>
      <text x="18" y="70" class="tiny">로봇</text>
      <rect x="96" y="47" width="86" height="34" rx="17" fill="#f1f5f9"/>
      <text x="113" y="70" class="tiny">미래차</text>
      <rect x="192" y="47" width="66" height="34" rx="17" fill="#eef7f3"/>
      <text x="209" y="70" class="tiny">방산</text>

      <rect x="0" y="94" width="94" height="34" rx="17" fill="#eef7f3"/>
      <text x="14" y="117" class="tiny">이차전지</text>
      <rect x="104" y="94" width="78" height="34" rx="17" fill="#f1f5f9"/>
      <text x="126" y="117" class="tiny">수소</text>
      <rect x="192" y="94" width="66" height="34" rx="17" fill="#fff1e3"/>
      <text x="209" y="117" class="tiny">광물</text>
    </g>
  </g>

  <g>
    <rect x="72" y="562" width="234" height="38" rx="19" fill="#172033"/>
    <text x="94" y="587" class="pill">판매: 2026.5.22 ~ 6.11</text>
    <rect x="324" y="562" width="230" height="38" rx="19" fill="#126c58"/>
    <text x="347" y="587" class="pill">최대 소득공제 1,800만 원</text>
    <rect x="572" y="562" width="174" height="38" rx="19" fill="#2f80ed"/>
    <text x="596" y="587" class="pill">9% 분리과세</text>
    <rect x="764" y="562" width="246" height="38" rx="19" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
    <text x="790" y="587" class="risk">원금보장 상품 아님</text>
  </g>
</svg>
