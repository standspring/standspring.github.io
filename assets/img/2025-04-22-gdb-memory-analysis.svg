<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">GDB memory analysis workflow</title>
  <desc id="desc">Infographic showing GDB memory analysis commands and core dump debugging workflow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f8fb"/>
      <stop offset="1" stop-color="#eef5f2"/>
    </linearGradient>
    <linearGradient id="terminal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#1f2937" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="6" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#425166"/>
    </marker>
    <style>
      .font { font-family: "Segoe UI", "Noto Sans KR", "Malgun Gothic", Arial, sans-serif; }
      .mono { font-family: "Cascadia Mono", Consolas, "Courier New", monospace; }
      .title { fill: #1f2937; font-size: 42px; font-weight: 800; }
      .subtitle { fill: #66758a; font-size: 20px; }
      .card-title { fill: #253244; font-size: 21px; font-weight: 800; }
      .card-text { fill: #64748b; font-size: 16px; }
      .terminal-text { fill: #d1fae5; font-size: 17px; }
      .terminal-muted { fill: #9ca3af; font-size: 15px; }
      .label { fill: #ffffff; font-size: 18px; font-weight: 800; }
      .small { fill: #64748b; font-size: 14px; }
    </style>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect x="72" y="56" width="1056" height="608" rx="18" fill="#ffffff" filter="url(#shadow)"/>

  <text class="font title" x="108" y="116">gdb 메모리 분석 흐름</text>
  <text class="font subtitle" x="108" y="153">주소 확인, 메모리 덤프, core dump 분석까지 한 번에 추적합니다.</text>

  <g transform="translate(108 198)">
    <rect x="0" y="0" width="282" height="116" rx="14" fill="#f5f7fb" stroke="#dbe4ee"/>
    <circle cx="42" cy="42" r="22" fill="#5677de"/>
    <text class="font label" x="36" y="49">1</text>
    <text class="font card-title" x="78" y="42">디버그 빌드</text>
    <text class="mono card-text" x="78" y="72">gcc -g memtest.c</text>
    <text class="font small" x="78" y="96">심볼 정보로 소스 레벨 분석</text>

    <line x1="298" y1="58" x2="334" y2="58" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="350" y="0" width="282" height="116" rx="14" fill="#f3fbf7" stroke="#cde9dd"/>
    <circle cx="392" cy="42" r="22" fill="#3d8f84"/>
    <text class="font label" x="386" y="49">2</text>
    <text class="font card-title" x="428" y="42">브레이크포인트</text>
    <text class="mono card-text" x="428" y="72">break print_addrs</text>
    <text class="font small" x="428" y="96">멈춘 지점에서 상태 확인</text>

    <line x1="648" y1="58" x2="684" y2="58" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="700" y="0" width="282" height="116" rx="14" fill="#fff7ec" stroke="#f2d3a3"/>
    <circle cx="742" cy="42" r="22" fill="#e9894c"/>
    <text class="font label" x="736" y="49">3</text>
    <text class="font card-title" x="778" y="42">주소와 값 확인</text>
    <text class="mono card-text" x="778" y="72">print &amp;local_var</text>
    <text class="mono card-text" x="778" y="96">x/4x &amp;global_var</text>
  </g>

  <g transform="translate(108 354)">
    <rect x="0" y="0" width="472" height="220" rx="16" fill="url(#terminal)"/>
    <rect x="0" y="0" width="472" height="34" rx="16" fill="#374151"/>
    <circle cx="24" cy="17" r="6" fill="#ff6b6b"/>
    <circle cx="44" cy="17" r="6" fill="#f7c66f"/>
    <circle cx="64" cy="17" r="6" fill="#6edb8f"/>
    <text class="mono terminal-text" x="24" y="66">(gdb) print &amp;global_var</text>
    <text class="mono terminal-muted" x="24" y="91">$1 = 0x404024  data 영역</text>
    <text class="mono terminal-text" x="24" y="125">(gdb) print &amp;local_var</text>
    <text class="mono terminal-muted" x="24" y="150">$2 = 0x7fffffffe53c  stack</text>
    <text class="mono terminal-text" x="24" y="184">(gdb) print heap_var</text>
    <text class="mono terminal-muted" x="24" y="209">$3 = 0x555555757260  heap</text>
  </g>

  <g transform="translate(632 332)">
    <rect x="0" y="0" width="440" height="264" rx="16" fill="#f9fbfd" stroke="#d9e2ec" stroke-width="2"/>
    <text class="font card-title" x="30" y="42">core dump 분석 루프</text>
    <text class="font card-text" x="30" y="70">프로그램이 죽은 순간의 스냅샷을 gdb로 엽니다.</text>

    <rect x="30" y="98" width="170" height="46" rx="9" fill="#4e5f78"/>
    <text class="mono" x="50" y="127" fill="#ffffff" font-size="15">gdb ./crash core</text>

    <line x1="216" y1="121" x2="270" y2="121" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="286" y="98" width="124" height="46" rx="9" fill="#5677de"/>
    <text class="mono" x="327" y="127" fill="#ffffff" font-size="16" font-weight="800">bt</text>

    <line x1="348" y1="154" x2="348" y2="188" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="228" y="202" width="182" height="46" rx="9" fill="#3d8f84"/>
    <text class="mono" x="255" y="231" fill="#ffffff" font-size="16" font-weight="800">info locals</text>

    <line x1="212" y1="225" x2="158" y2="225" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="30" y="202" width="112" height="46" rx="9" fill="#e9894c"/>
    <text class="mono" x="57" y="231" fill="#ffffff" font-size="16" font-weight="800">list</text>
  </g>

  <g transform="translate(108 610)">
    <rect x="0" y="0" width="964" height="34" rx="17" fill="#eef4f8"/>
    <text class="font" x="24" y="23" fill="#4f5f73" font-size="15" font-weight="700">핵심 명령: break, run, next, print, x/4x, bt, frame, info locals, list</text>
  </g>
</svg>
