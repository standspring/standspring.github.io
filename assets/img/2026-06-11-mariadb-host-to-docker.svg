<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">MariaDB host to Docker migration diagram</title>
  <desc id="desc">Host MariaDB is backed up, restored into a Docker MariaDB container, and connected to the application through port 3306.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef6ff"/>
      <stop offset="100%" stop-color="#f8fbf7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1d3557" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="80" y="95" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#18324a">MariaDB를 Docker 환경으로 이전하기</text>
  <text x="82" y="135" font-family="Arial, sans-serif" font-size="22" fill="#52677a">백업, 컨테이너 준비, 복원, 포트 전환 순서로 안전하게 이동</text>

  <g filter="url(#shadow)">
    <rect x="80" y="215" width="260" height="190" rx="12" fill="#ffffff" stroke="#bfd4e8"/>
    <text x="210" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#184e77">Host MariaDB</text>
    <rect x="135" y="295" width="150" height="70" rx="35" fill="#dceeff" stroke="#83b7df"/>
    <ellipse cx="210" cy="295" rx="75" ry="18" fill="#eef7ff" stroke="#83b7df"/>
    <text x="210" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#184e77">/var/lib/mysql</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="470" y="215" width="260" height="190" rx="12" fill="#ffffff" stroke="#c9d9c5"/>
    <text x="600" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#2d6a4f">Dump Backup</text>
    <path d="M535 292h130l25 28v55H535z" fill="#edf7ed" stroke="#87b38d"/>
    <path d="M665 292v28h25" fill="none" stroke="#87b38d"/>
    <text x="600" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#2d6a4f">all.sql</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="860" y="215" width="260" height="190" rx="12" fill="#ffffff" stroke="#f0c89a"/>
    <text x="990" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#9c5a00">Docker MariaDB</text>
    <rect x="925" y="294" width="130" height="86" rx="10" fill="#fff4df" stroke="#e8a84e"/>
    <text x="990" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#9c5a00">container</text>
  </g>

  <path d="M355 310h85" stroke="#577590" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <path d="M745 310h85" stroke="#577590" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0l10 5-10 5z" fill="#577590"/>
    </marker>
  </defs>

  <g font-family="Arial, sans-serif" font-size="20" fill="#334e68">
    <text x="170" y="475">1. 기존 DB 백업</text>
    <text x="505" y="475">2. Compose로 컨테이너 실행</text>
    <text x="890" y="475">3. 백업 파일 복원</text>
    <text x="395" y="535">4. 애플리케이션 접속 정보를 새 DB로 전환</text>
  </g>
</svg>
