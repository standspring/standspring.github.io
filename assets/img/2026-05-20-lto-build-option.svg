<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">LTO Build Option Concept Diagram</title>
  <desc id="desc">C++ source files are compiled into object files containing intermediate representation, then link time optimization analyzes them together and produces an optimized executable.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="52%" stop-color="#eef6f4"/>
      <stop offset="100%" stop-color="#fff8ec"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2f80ed"/>
      <stop offset="100%" stop-color="#185abc"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#21a67a"/>
      <stop offset="100%" stop-color="#0b7a5c"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f2a93b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#17324d" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#52616f"/>
    </marker>
    <style>
      .label { font-family: Arial, Helvetica, sans-serif; fill: #1d2b36; }
      .muted { fill: #627282; }
      .card { fill: #ffffff; stroke: #d9e4ea; stroke-width: 2; }
      .code { font-family: Consolas, Monaco, monospace; fill: #26343f; }
    </style>
  </defs>

  <rect width="1200" height="640" rx="32" fill="url(#bg)"/>

  <text x="600" y="66" text-anchor="middle" class="label" font-size="34" font-weight="700">LTO Build Option</text>
  <text x="600" y="104" text-anchor="middle" class="label muted" font-size="18">Compile units keep optimization metadata, then the linker optimizes across file boundaries.</text>

  <g filter="url(#shadow)">
    <rect x="72" y="168" width="224" height="304" rx="18" class="card"/>
    <rect x="72" y="168" width="224" height="58" rx="18" fill="url(#blue)"/>
    <path d="M72 208 H296 V226 H72 Z" fill="url(#blue)"/>
    <text x="184" y="204" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Source Files</text>

    <rect x="108" y="258" width="152" height="44" rx="8" fill="#f3f7fb" stroke="#d7e3ec"/>
    <text x="184" y="286" text-anchor="middle" class="code" font-size="18">a.cpp</text>
    <rect x="108" y="322" width="152" height="44" rx="8" fill="#f3f7fb" stroke="#d7e3ec"/>
    <text x="184" y="350" text-anchor="middle" class="code" font-size="18">b.cpp</text>
    <rect x="108" y="386" width="152" height="44" rx="8" fill="#f3f7fb" stroke="#d7e3ec"/>
    <text x="184" y="414" text-anchor="middle" class="code" font-size="18">c.cpp</text>
  </g>

  <g>
    <line x1="318" y1="320" x2="405" y2="320" stroke="#52616f" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="362" y="295" text-anchor="middle" class="label muted" font-size="16">compile</text>
    <text x="362" y="348" text-anchor="middle" class="code" font-size="15">-flto</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="420" y="168" width="264" height="304" rx="18" class="card"/>
    <rect x="420" y="168" width="264" height="58" rx="18" fill="url(#green)"/>
    <path d="M420 208 H684 V226 H420 Z" fill="url(#green)"/>
    <text x="552" y="204" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Object Files</text>

    <rect x="458" y="252" width="188" height="54" rx="9" fill="#f4fbf8" stroke="#cce6dc"/>
    <text x="552" y="275" text-anchor="middle" class="code" font-size="17">a.o</text>
    <text x="552" y="296" text-anchor="middle" class="label muted" font-size="14">machine code + IR</text>
    <rect x="458" y="322" width="188" height="54" rx="9" fill="#f4fbf8" stroke="#cce6dc"/>
    <text x="552" y="345" text-anchor="middle" class="code" font-size="17">b.o</text>
    <text x="552" y="366" text-anchor="middle" class="label muted" font-size="14">machine code + IR</text>
    <rect x="458" y="392" width="188" height="54" rx="9" fill="#f4fbf8" stroke="#cce6dc"/>
    <text x="552" y="415" text-anchor="middle" class="code" font-size="17">c.o</text>
    <text x="552" y="436" text-anchor="middle" class="label muted" font-size="14">machine code + IR</text>
  </g>

  <g>
    <line x1="708" y1="320" x2="785" y2="320" stroke="#52616f" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="746" y="295" text-anchor="middle" class="label muted" font-size="16">link</text>
    <text x="746" y="348" text-anchor="middle" class="code" font-size="15">-flto</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="804" y="150" width="324" height="340" rx="22" fill="#ffffff" stroke="#e2d6bf" stroke-width="2"/>
    <rect x="804" y="150" width="324" height="64" rx="22" fill="url(#amber)"/>
    <path d="M804 194 H1128 V214 H804 Z" fill="url(#amber)"/>
    <text x="966" y="190" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">Link-Time Optimizer</text>

    <g transform="translate(856 248)">
      <circle cx="0" cy="0" r="9" fill="#d97706"/>
      <text x="24" y="6" class="label" font-size="17">cross-file inlining</text>
      <circle cx="0" cy="52" r="9" fill="#d97706"/>
      <text x="24" y="58" class="label" font-size="17">dead code elimination</text>
      <circle cx="0" cy="104" r="9" fill="#d97706"/>
      <text x="24" y="110" class="label" font-size="17">constant propagation</text>
      <circle cx="0" cy="156" r="9" fill="#d97706"/>
      <text x="24" y="162" class="label" font-size="17">devirtualization</text>
    </g>
  </g>

  <line x1="966" y1="492" x2="966" y2="545" stroke="#52616f" stroke-width="3" marker-end="url(#arrow)"/>

  <g>
    <rect x="786" y="548" width="360" height="58" rx="15" fill="#1d2b36"/>
    <text x="966" y="584" text-anchor="middle" fill="#ffffff" font-family="Consolas, Monaco, monospace" font-size="20">optimized executable</text>
  </g>

  <g opacity="0.78">
    <rect x="88" y="530" width="548" height="54" rx="12" fill="#ffffff" stroke="#d9e4ea"/>
    <text x="112" y="563" class="label muted" font-size="16">Key idea:</text>
    <text x="190" y="563" class="label" font-size="15">optimize across object files at link time.</text>
  </g>
</svg>
