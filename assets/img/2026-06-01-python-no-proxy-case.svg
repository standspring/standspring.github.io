<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">no_proxy와 NO_PROXY 비교 인포그래픽</title>
  <desc id="desc">Python urllib, Requests, HTTPX, curl, Go가 proxy 우회 환경변수를 어떻게 읽는지 비교한 다이어그램</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .panel { fill: #ffffff; stroke: #d7dce5; stroke-width: 2; rx: 16; }
      .title { font: 700 38px "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; fill: #111827; }
      .subtitle { font: 500 18px "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; fill: #4b5563; }
      .h { font: 700 23px "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; fill: #111827; }
      .b { font: 600 17px "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; fill: #1f2937; }
      .t { font: 500 15px "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; fill: #374151; }
      .small { font: 500 13px "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; fill: #5b6472; }
      .code { font: 700 17px "Cascadia Mono", "Consolas", monospace; fill: #0f172a; }
      .chip { fill: #eef4ff; stroke: #9ab8f4; stroke-width: 1.5; rx: 12; }
      .good { fill: #ecfdf5; stroke: #6ee7b7; stroke-width: 1.5; rx: 12; }
      .warn { fill: #fff7ed; stroke: #fdba74; stroke-width: 1.5; rx: 12; }
      .danger { fill: #fef2f2; stroke: #fca5a5; stroke-width: 1.5; rx: 12; }
      .arrow { stroke: #6b7280; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="720"/>
  <text x="60" y="62" class="title">Python에서 no_proxy vs NO_PROXY</text>
  <text x="60" y="95" class="subtitle">대부분 둘 다 읽지만, 충돌 우선순위와 CGI 보안 규칙은 도구마다 다릅니다.</text>

  <rect x="60" y="132" width="500" height="210" class="panel"/>
  <text x="92" y="172" class="h">Python urllib.request</text>
  <rect x="92" y="198" width="180" height="42" class="good"/>
  <text x="110" y="225" class="code">no_proxy</text>
  <rect x="302" y="198" width="180" height="42" class="good"/>
  <text x="320" y="225" class="code">NO_PROXY</text>
  <path d="M272 219 H302" class="arrow"/>
  <text x="92" y="272" class="b">POSIX에서 둘 다 있으면 소문자 우선</text>
  <text x="92" y="301" class="t">Windows는 환경변수 이름이 사실상 대소문자 비구분이라</text>
  <text x="92" y="324" class="t">두 값을 동시에 다르게 유지하기 어렵습니다.</text>

  <rect x="640" y="132" width="500" height="210" class="panel"/>
  <text x="672" y="172" class="h">Requests / HTTPX</text>
  <rect x="672" y="198" width="185" height="42" class="chip"/>
  <text x="690" y="225" class="code">trust_env=True</text>
  <path d="M862 219 H910" class="arrow"/>
  <rect x="918" y="198" width="170" height="42" class="good"/>
  <text x="936" y="225" class="code">env proxy</text>
  <text x="672" y="272" class="b">환경변수 자동 참조가 기본</text>
  <text x="672" y="301" class="t">Requests는 소문자와 대문자 변형을 지원한다고 문서화합니다.</text>
  <text x="672" y="324" class="t">HTTPX는 문서에서 대문자 변수명을 중심으로 설명합니다.</text>

  <rect x="60" y="386" width="500" height="225" class="panel"/>
  <text x="92" y="426" class="h">CGI / HTTP_PROXY 보안 예외</text>
  <rect x="92" y="455" width="165" height="42" class="danger"/>
  <text x="110" y="482" class="code">HTTP_PROXY</text>
  <path d="M262 476 H320" class="arrow"/>
  <rect x="328" y="455" width="176" height="42" class="warn"/>
  <text x="346" y="482" class="code">무시될 수 있음</text>
  <text x="92" y="532" class="b">REQUEST_METHOD가 있으면 Python은 HTTP_PROXY를 무시</text>
  <text x="92" y="561" class="t">HTTP 요청 헤더 Proxy: 가 CGI 환경변수로 주입되는</text>
  <text x="92" y="584" class="t">문제를 막기 위한 오래된 보안 규칙입니다.</text>

  <rect x="640" y="386" width="500" height="225" class="panel"/>
  <text x="672" y="426" class="h">실무 권장값</text>
  <rect x="672" y="456" width="190" height="42" class="good"/>
  <text x="690" y="483" class="code">no_proxy</text>
  <rect x="886" y="456" width="190" height="42" class="chip"/>
  <text x="904" y="483" class="code">NO_PROXY</text>
  <text x="672" y="532" class="b">둘 다 같은 값으로 맞추면 가장 안전</text>
  <text x="672" y="561" class="t">Python만 보는 코드라면 소문자가 무난하고, 여러 도구가 섞이면</text>
  <text x="672" y="584" class="t">대문자까지 함께 맞춰 운영 환경 차이를 줄입니다.</text>

  <text x="60" y="664" class="small">요약: 우회 목록 자체는 같은 의미지만, 대소문자 처리와 충돌 해결은 구현체별 정책입니다.</text>
</svg>
