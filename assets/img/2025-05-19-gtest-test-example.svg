<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">GTest and GMock practical test patterns infographic</title>
  <desc id="desc">Infographic showing practical GoogleTest and GoogleMock patterns: assertions, test fixtures, mock call verification, and production testing habits.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#edf7f3"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101827"/>
      <stop offset="1" stop-color="#18324a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f8fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#d7e7ef" stroke-width="1" opacity="0.72"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#38536d"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#grid)"/>

  <g transform="translate(70 62)">
    <text x="0" y="0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="44" font-weight="800" fill="#162235">GTest &amp; GMock Patterns</text>
    <text x="2" y="40" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" fill="#53677d">Assertions, fixtures, mocks, and naming habits for practical C++ unit tests</text>
  </g>

  <g transform="translate(70 154)" filter="url(#shadow)">
    <rect width="332" height="456" rx="8" fill="url(#dark)"/>
    <rect width="332" height="44" rx="8" fill="#0b1220"/>
    <circle cx="28" cy="22" r="7" fill="#ef4444"/>
    <circle cx="52" cy="22" r="7" fill="#f59e0b"/>
    <circle cx="76" cy="22" r="7" fill="#22c55e"/>
    <text x="28" y="86" font-family="Consolas, Menlo, monospace" font-size="22" font-weight="700" fill="#f8fafc">test_example.cpp</text>
    <text x="28" y="126" font-family="Consolas, Menlo, monospace" font-size="17" fill="#93c5fd">TEST_F(VectorTest, SizeCheck) {</text>
    <text x="52" y="160" font-family="Consolas, Menlo, monospace" font-size="17" fill="#86efac">EXPECT_EQ(vec.size(), 2);</text>
    <text x="28" y="194" font-family="Consolas, Menlo, monospace" font-size="17" fill="#93c5fd">}</text>
    <text x="28" y="252" font-family="Consolas, Menlo, monospace" font-size="17" fill="#fef3c7">EXPECT_CALL(mock, Print(...))</text>
    <text x="52" y="286" font-family="Consolas, Menlo, monospace" font-size="17" fill="#fef3c7">.Times(1);</text>
    <text x="28" y="350" font-family="Consolas, Menlo, monospace" font-size="17" fill="#fca5a5">TEST(Math_Addition_Positive,</text>
    <text x="52" y="384" font-family="Consolas, Menlo, monospace" font-size="17" fill="#fca5a5">ShouldReturnSum)</text>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(464 160)">
      <rect width="230" height="168" rx="8" fill="url(#card)" stroke="#c7d7e6" stroke-width="2"/>
      <circle cx="115" cy="52" r="30" fill="#dbeafe"/>
      <path d="M92 52 H130" stroke="#2563eb" stroke-width="7" stroke-linecap="round"/>
      <path d="M111 34 L134 34" stroke="#2563eb" stroke-width="7" stroke-linecap="round"/>
      <text x="115" y="108" text-anchor="middle" font-size="23" font-weight="800" fill="#162235">Assertions</text>
      <text x="115" y="136" text-anchor="middle" font-size="15" fill="#5d7185">EXPECT_* vs ASSERT_*</text>
    </g>

    <g transform="translate(754 160)">
      <rect width="230" height="168" rx="8" fill="url(#card)" stroke="#c7d7e6" stroke-width="2"/>
      <circle cx="115" cy="52" r="30" fill="#dcfce7"/>
      <path d="M94 43 H130 M94 58 H130 M94 73 H118" stroke="#16a34a" stroke-width="7" stroke-linecap="round"/>
      <text x="115" y="108" text-anchor="middle" font-size="23" font-weight="800" fill="#162235">Test Fixture</text>
      <text x="115" y="136" text-anchor="middle" font-size="15" fill="#5d7185">SetUp() / TearDown()</text>
    </g>

    <g transform="translate(464 396)">
      <rect width="230" height="168" rx="8" fill="url(#card)" stroke="#c7d7e6" stroke-width="2"/>
      <circle cx="115" cy="52" r="30" fill="#fef3c7"/>
      <rect x="88" y="36" width="54" height="34" rx="6" fill="#d97706"/>
      <circle cx="104" cy="53" r="5" fill="#fff7ed"/>
      <circle cx="126" cy="53" r="5" fill="#fff7ed"/>
      <path d="M142 52 H154" stroke="#d97706" stroke-width="7" stroke-linecap="round"/>
      <text x="115" y="108" text-anchor="middle" font-size="23" font-weight="800" fill="#162235">GoogleMock</text>
      <text x="115" y="136" text-anchor="middle" font-size="15" fill="#5d7185">MOCK_METHOD + EXPECT_CALL</text>
    </g>

    <g transform="translate(754 396)">
      <rect width="230" height="168" rx="8" fill="url(#card)" stroke="#c7d7e6" stroke-width="2"/>
      <circle cx="115" cy="52" r="30" fill="#e0f2fe"/>
      <path d="M92 56 L108 72 L140 36" fill="none" stroke="#0284c7" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="115" y="108" text-anchor="middle" font-size="23" font-weight="800" fill="#162235">Real Patterns</text>
      <text x="115" y="136" text-anchor="middle" font-size="15" fill="#5d7185">names, edges, utilities</text>
    </g>

    <g transform="translate(1030 220)">
      <rect width="172" height="284" rx="8" fill="#ffffff" stroke="#c7d7e6" stroke-width="2"/>
      <circle cx="86" cy="66" r="32" fill="#dcfce7"/>
      <path d="M66 66 L81 81 L110 48" fill="none" stroke="#16a34a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="86" y="134" text-anchor="middle" font-size="24" font-weight="800" fill="#162235">Stable</text>
      <text x="86" y="164" text-anchor="middle" font-size="24" font-weight="800" fill="#162235">Tests</text>
      <text x="86" y="210" text-anchor="middle" font-size="16" fill="#5d7185">clear</text>
      <text x="86" y="238" text-anchor="middle" font-size="16" fill="#5d7185">repeatable</text>
      <text x="86" y="266" text-anchor="middle" font-size="16" fill="#5d7185">maintainable</text>
    </g>
  </g>

  <g stroke="#38536d" stroke-width="3" stroke-linecap="round" fill="none" marker-end="url(#arrow)">
    <path d="M402 244 H456"/>
    <path d="M694 244 H746"/>
    <path d="M579 336 V388"/>
    <path d="M869 336 V388"/>
    <path d="M694 480 H746"/>
    <path d="M988 244 H1022"/>
    <path d="M988 480 H1022"/>
  </g>

  <g transform="translate(462 616)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect width="720" height="46" rx="8" fill="#162235" opacity="0.94"/>
    <text x="34" y="30" font-size="18" font-weight="700" fill="#f8fafc">Practice loop:</text>
    <text x="154" y="30" font-size="18" fill="#dbeafe">verify values, isolate state, mock boundaries, and name cases clearly</text>
  </g>
</svg>
