<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">GoogleMock call verification workflow infographic</title>
  <desc id="desc">Infographic showing how GoogleMock replaces external dependencies with mock objects, sets expectations with EXPECT_CALL, controls behavior with Times and WillOnce, and verifies test results.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#edf7f3"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101827"/>
      <stop offset="1" stop-color="#18324a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f8fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#d7e7ef" stroke-width="1" opacity="0.72"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#38536d"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#grid)"/>

  <g transform="translate(70 62)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="0" y="0" font-size="44" font-weight="800" fill="#162235">GoogleMock Workflow</text>
    <text x="2" y="40" font-size="20" fill="#53677d">Replace dependencies, define call expectations, return controlled values, and verify behavior</text>
  </g>

  <g transform="translate(70 154)" filter="url(#shadow)">
    <rect width="330" height="456" rx="8" fill="url(#dark)"/>
    <rect width="330" height="44" rx="8" fill="#0b1220"/>
    <circle cx="28" cy="22" r="7" fill="#ef4444"/>
    <circle cx="52" cy="22" r="7" fill="#f59e0b"/>
    <circle cx="76" cy="22" r="7" fill="#22c55e"/>
    <text x="28" y="86" font-family="Consolas, Menlo, monospace" font-size="22" font-weight="700" fill="#f8fafc">mock_test.cpp</text>
    <text x="28" y="130" font-family="Consolas, Menlo, monospace" font-size="17" fill="#93c5fd">class MockPrinter : Printer {</text>
    <text x="52" y="166" font-family="Consolas, Menlo, monospace" font-size="17" fill="#86efac">MOCK_METHOD(void, Print,</text>
    <text x="76" y="198" font-family="Consolas, Menlo, monospace" font-size="17" fill="#86efac">(string msg), (override));</text>
    <text x="28" y="232" font-family="Consolas, Menlo, monospace" font-size="17" fill="#93c5fd">};</text>
    <text x="28" y="292" font-family="Consolas, Menlo, monospace" font-size="17" fill="#fef3c7">EXPECT_CALL(mock, Print(...))</text>
    <text x="52" y="326" font-family="Consolas, Menlo, monospace" font-size="17" fill="#fef3c7">.Times(1)</text>
    <text x="52" y="360" font-family="Consolas, Menlo, monospace" font-size="17" fill="#fef3c7">.WillOnce(Return(true));</text>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(460 174)">
      <rect width="182" height="150" rx="8" fill="url(#card)" stroke="#c7d7e6" stroke-width="2"/>
      <circle cx="91" cy="50" r="30" fill="#fee2e2"/>
      <path d="M74 38 H92 V62 H74 Z" fill="none" stroke="#dc2626" stroke-width="6" stroke-linejoin="round"/>
      <path d="M92 50 H111 M111 39 V61" fill="none" stroke="#dc2626" stroke-width="6" stroke-linecap="round"/>
      <path d="M77 34 V26 M89 34 V26" stroke="#dc2626" stroke-width="5" stroke-linecap="round"/>
      <text x="91" y="106" text-anchor="middle" font-size="22" font-weight="800" fill="#162235">Dependency</text>
      <text x="91" y="132" text-anchor="middle" font-size="15" fill="#5d7185">network, file, printer</text>
    </g>

    <g transform="translate(716 174)">
      <rect width="182" height="150" rx="8" fill="url(#card)" stroke="#c7d7e6" stroke-width="2"/>
      <circle cx="91" cy="50" r="30" fill="#fef3c7"/>
      <rect x="63" y="35" width="56" height="34" rx="7" fill="#d97706"/>
      <circle cx="80" cy="52" r="5" fill="#fff7ed"/>
      <circle cx="102" cy="52" r="5" fill="#fff7ed"/>
      <path d="M119 52 H131" stroke="#d97706" stroke-width="7" stroke-linecap="round"/>
      <text x="91" y="106" text-anchor="middle" font-size="22" font-weight="800" fill="#162235">Mock Object</text>
      <text x="91" y="132" text-anchor="middle" font-size="15" fill="#5d7185">MOCK_METHOD</text>
    </g>

    <g transform="translate(972 174)">
      <rect width="182" height="150" rx="8" fill="url(#card)" stroke="#c7d7e6" stroke-width="2"/>
      <circle cx="91" cy="50" r="30" fill="#dbeafe"/>
      <path d="M68 41 H114 M68 56 H102 M68 71 H121" stroke="#2563eb" stroke-width="7" stroke-linecap="round"/>
      <text x="91" y="106" text-anchor="middle" font-size="22" font-weight="800" fill="#162235">Expectation</text>
      <text x="91" y="132" text-anchor="middle" font-size="15" fill="#5d7185">EXPECT_CALL</text>
    </g>

    <g transform="translate(432 416)">
      <rect width="220" height="150" rx="8" fill="url(#card)" stroke="#c7d7e6" stroke-width="2"/>
      <circle cx="110" cy="50" r="30" fill="#e0f2fe"/>
      <text x="110" y="58" text-anchor="middle" font-size="30" font-weight="900" fill="#0284c7">1x</text>
      <text x="110" y="106" text-anchor="middle" font-size="22" font-weight="800" fill="#162235">Call Count</text>
      <text x="110" y="132" text-anchor="middle" font-size="15" fill="#5d7185">Times(n)</text>
    </g>

    <g transform="translate(708 416)">
      <rect width="220" height="150" rx="8" fill="url(#card)" stroke="#c7d7e6" stroke-width="2"/>
      <circle cx="110" cy="50" r="30" fill="#dcfce7"/>
      <path d="M86 50 H126 M112 36 L130 50 L112 64" fill="none" stroke="#16a34a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="110" y="106" text-anchor="middle" font-size="22" font-weight="800" fill="#162235">Return Value</text>
      <text x="110" y="132" text-anchor="middle" font-size="15" fill="#5d7185">WillOnce(Return)</text>
    </g>

    <g transform="translate(993 416)">
      <rect width="140" height="150" rx="8" fill="#ffffff" stroke="#c7d7e6" stroke-width="2"/>
      <circle cx="70" cy="50" r="30" fill="#dcfce7"/>
      <path d="M51 50 L65 64 L91 36" fill="none" stroke="#16a34a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="70" y="106" text-anchor="middle" font-size="22" font-weight="800" fill="#162235">PASS</text>
      <text x="70" y="132" text-anchor="middle" font-size="15" fill="#5d7185">verified</text>
    </g>
  </g>

  <g stroke="#38536d" stroke-width="3" stroke-linecap="round" fill="none" marker-end="url(#arrow)">
    <path d="M400 249 H452"/>
    <path d="M646 249 H708"/>
    <path d="M902 249 H964"/>
    <path d="M1063 326 V408"/>
    <path d="M654 491 H700"/>
    <path d="M930 491 H985"/>
    <path d="M1063 326 V364 H542 V408"/>
    <path d="M1063 364 H818 V408"/>
  </g>

  <g transform="translate(462 616)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect width="714" height="46" rx="8" fill="#162235" opacity="0.94"/>
    <text x="34" y="30" font-size="18" font-weight="700" fill="#f8fafc">Core idea:</text>
    <text x="134" y="30" font-size="18" fill="#dbeafe">mock the boundary, expect the call, control the response, verify the unit</text>
  </g>
</svg>
