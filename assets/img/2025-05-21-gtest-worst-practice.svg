<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">GTest worst practices and refactoring guide infographic</title>
  <desc id="desc">Three-row infographic comparing common bad GTest patterns with cleaner refactored test patterns.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8f8"/>
      <stop offset="1" stop-color="#eef7ff"/>
    </linearGradient>
    <linearGradient id="badCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fff1f2"/>
    </linearGradient>
    <linearGradient id="goodCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f0fdf4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#eadfe5" stroke-width="1" opacity="0.6"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#grid)"/>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <g transform="translate(70 62)">
      <text x="0" y="0" font-size="44" font-weight="800" fill="#172033">GTest Code Smells</text>
      <text x="2" y="40" font-size="20" fill="#5b6878">Turn hard-to-maintain tests into clear, focused, repeatable unit tests</text>
    </g>

    <g transform="translate(70 132)">
      <text x="0" y="0" font-size="22" font-weight="800" fill="#991b1b">Bad Pattern</text>
      <text x="690" y="0" font-size="22" font-weight="800" fill="#166534">Refactor To</text>
    </g>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(70 160)">
      <rect width="500" height="118" rx="8" fill="url(#badCard)" stroke="#fecaca" stroke-width="2"/>
      <circle cx="58" cy="59" r="30" fill="#fee2e2"/>
      <rect x="41" y="38" width="25" height="31" rx="4" fill="#fecaca" stroke="#dc2626" stroke-width="4"/>
      <rect x="51" y="48" width="25" height="31" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="4"/>
      <text x="112" y="48" font-size="24" font-weight="800" fill="#172033">Duplicate Setup</text>
      <text x="112" y="80" font-size="17" fill="#64748b">same initialization copied into every TEST</text>
    </g>

    <g transform="translate(710 160)">
      <rect width="500" height="118" rx="8" fill="url(#goodCard)" stroke="#bbf7d0" stroke-width="2"/>
      <circle cx="58" cy="59" r="30" fill="#dcfce7"/>
      <path d="M58 39 V58 M44 58 H72 M44 58 V72 M72 58 V72" fill="none" stroke="#16a34a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="44" cy="76" r="5" fill="#16a34a"/>
      <circle cx="72" cy="76" r="5" fill="#16a34a"/>
      <text x="112" y="48" font-size="24" font-weight="800" fill="#172033">Use Test Fixture</text>
      <text x="112" y="80" font-size="17" fill="#64748b">move shared state into SetUp() and TEST_F</text>
    </g>

    <g transform="translate(70 314)">
      <rect width="500" height="118" rx="8" fill="url(#badCard)" stroke="#fecaca" stroke-width="2"/>
      <circle cx="58" cy="59" r="30" fill="#fee2e2"/>
      <text x="58" y="70" text-anchor="middle" font-size="36" font-weight="900" fill="#dc2626">?</text>
      <text x="112" y="48" font-size="24" font-weight="800" fill="#172033">Vague Test Names</text>
      <text x="112" y="80" font-size="17" fill="#64748b">Test1, Case2, Complex hide the intent</text>
    </g>

    <g transform="translate(710 314)">
      <rect width="500" height="118" rx="8" fill="url(#goodCard)" stroke="#bbf7d0" stroke-width="2"/>
      <circle cx="58" cy="59" r="30" fill="#dcfce7"/>
      <path d="M38 50 H78 M38 66 H66" stroke="#16a34a" stroke-width="7" stroke-linecap="round"/>
      <text x="112" y="48" font-size="24" font-weight="800" fill="#172033">Name the Behavior</text>
      <text x="112" y="80" font-size="17" fill="#64748b">Class_Method_Condition, ShouldExpectedResult</text>
    </g>

    <g transform="translate(70 468)">
      <rect width="500" height="118" rx="8" fill="url(#badCard)" stroke="#fecaca" stroke-width="2"/>
      <circle cx="58" cy="59" r="30" fill="#fee2e2"/>
      <rect x="38" y="39" width="40" height="14" rx="4" fill="#fecaca" stroke="#dc2626" stroke-width="4"/>
      <rect x="38" y="55" width="40" height="14" rx="4" fill="#fecaca" stroke="#dc2626" stroke-width="4"/>
      <rect x="38" y="71" width="40" height="14" rx="4" fill="#fecaca" stroke="#dc2626" stroke-width="4"/>
      <text x="112" y="48" font-size="24" font-weight="800" fill="#172033">Overloaded Test</text>
      <text x="112" y="80" font-size="17" fill="#64748b">one test checks add, subtract, multiply together</text>
    </g>

    <g transform="translate(710 468)">
      <rect width="500" height="118" rx="8" fill="url(#goodCard)" stroke="#bbf7d0" stroke-width="2"/>
      <circle cx="58" cy="59" r="30" fill="#dcfce7"/>
      <path d="M41 45 H76 M41 59 H76 M41 73 H64" stroke="#16a34a" stroke-width="7" stroke-linecap="round"/>
      <text x="112" y="48" font-size="24" font-weight="800" fill="#172033">Split by Behavior</text>
      <text x="112" y="80" font-size="17" fill="#64748b">one reason to fail for each focused test case</text>
    </g>
  </g>

  <g stroke="#475569" stroke-width="4" stroke-linecap="round" fill="none" marker-end="url(#arrow)">
    <path d="M580 219 H700"/>
    <path d="M580 373 H700"/>
    <path d="M580 527 H700"/>
  </g>

  <g transform="translate(280 626)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect width="720" height="48" rx="8" fill="#172033" opacity="0.94"/>
    <text x="34" y="31" font-size="18" font-weight="800" fill="#f8fafc">Refactor rule:</text>
    <text x="168" y="31" font-size="18" fill="#dbeafe">shared setup, clear intent, and one behavior per test</text>
  </g>
</svg>
