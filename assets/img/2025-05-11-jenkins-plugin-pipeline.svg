<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Jenkins Pipeline workflow infographic</title>
  <desc id="desc">Infographic showing Jenkinsfile, pipeline stages, plugins, credentials, reports, and notifications.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#edf2f7"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef4fb"/>
    </linearGradient>
    <linearGradient id="code" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="1" stop-color="#26384f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#1f2937" flood-opacity="0.14"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#d9e2ec" stroke-width="1" opacity="0.55"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b5166"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#grid)"/>

  <g transform="translate(70 62)">
    <text x="0" y="0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="44" font-weight="800" fill="#172033">Jenkins Pipeline Guide</text>
    <text x="2" y="40" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" fill="#516173">Define CI/CD as code with Jenkinsfile, stages, plugins, and reports</text>
  </g>

  <g transform="translate(70 165)" filter="url(#shadow)">
    <rect width="310" height="390" rx="8" fill="url(#code)"/>
    <rect x="0" y="0" width="310" height="44" rx="8" fill="#0f172a"/>
    <circle cx="28" cy="22" r="7" fill="#f43f5e"/>
    <circle cx="52" cy="22" r="7" fill="#facc15"/>
    <circle cx="76" cy="22" r="7" fill="#22c55e"/>
    <text x="28" y="86" font-family="Consolas, Menlo, monospace" font-size="22" font-weight="700" fill="#f8fafc">Jenkinsfile</text>
    <text x="28" y="126" font-family="Consolas, Menlo, monospace" font-size="18" fill="#93c5fd">pipeline {</text>
    <text x="52" y="162" font-family="Consolas, Menlo, monospace" font-size="18" fill="#dbeafe">agent any</text>
    <text x="52" y="198" font-family="Consolas, Menlo, monospace" font-size="18" fill="#86efac">stages {</text>
    <text x="76" y="234" font-family="Consolas, Menlo, monospace" font-size="18" fill="#fef3c7">Clone</text>
    <text x="76" y="270" font-family="Consolas, Menlo, monospace" font-size="18" fill="#fef3c7">Build</text>
    <text x="76" y="306" font-family="Consolas, Menlo, monospace" font-size="18" fill="#fef3c7">Test</text>
    <text x="76" y="342" font-family="Consolas, Menlo, monospace" font-size="18" fill="#fef3c7">Notify</text>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(430 272)">
      <rect width="150" height="156" rx="8" fill="url(#panel)" stroke="#cbd7e3" stroke-width="2"/>
      <circle cx="75" cy="55" r="30" fill="#dbeafe"/>
      <path d="M58 55 L71 68 L94 42" fill="none" stroke="#2563eb" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="75" y="112" text-anchor="middle" font-size="23" font-weight="800" fill="#172033">Clone</text>
      <text x="75" y="138" text-anchor="middle" font-size="15" fill="#627184">Git Plugin</text>
    </g>

    <g transform="translate(622 272)">
      <rect width="150" height="156" rx="8" fill="url(#panel)" stroke="#cbd7e3" stroke-width="2"/>
      <circle cx="75" cy="55" r="30" fill="#fee2e2"/>
      <path d="M54 72 L75 36 L96 72 Z" fill="#d33832"/>
      <rect x="52" y="75" width="46" height="10" rx="5" fill="#d33832"/>
      <text x="75" y="112" text-anchor="middle" font-size="23" font-weight="800" fill="#172033">Build</text>
      <text x="75" y="138" text-anchor="middle" font-size="15" fill="#627184">AnsiColor</text>
    </g>

    <g transform="translate(814 272)">
      <rect width="150" height="156" rx="8" fill="url(#panel)" stroke="#cbd7e3" stroke-width="2"/>
      <circle cx="75" cy="55" r="30" fill="#dcfce7"/>
      <path d="M54 55 h42 M75 34 v42" fill="none" stroke="#16a34a" stroke-width="8" stroke-linecap="round"/>
      <text x="75" y="112" text-anchor="middle" font-size="23" font-weight="800" fill="#172033">Test</text>
      <text x="75" y="138" text-anchor="middle" font-size="15" fill="#627184">JUnit Report</text>
    </g>

    <g transform="translate(1006 272)">
      <rect width="150" height="156" rx="8" fill="url(#panel)" stroke="#cbd7e3" stroke-width="2"/>
      <circle cx="75" cy="55" r="30" fill="#e0f2fe"/>
      <rect x="51" y="44" width="48" height="34" rx="6" fill="#0ea5e9"/>
      <path d="M51 48 L75 66 L99 48" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="75" y="112" text-anchor="middle" font-size="23" font-weight="800" fill="#172033">Notify</text>
      <text x="75" y="138" text-anchor="middle" font-size="15" fill="#627184">Slack</text>
    </g>

    <g transform="translate(430 476)">
      <rect width="150" height="124" rx="8" fill="#ffffff" stroke="#cbd7e3" stroke-width="2"/>
      <rect x="57" y="32" width="36" height="26" rx="6" fill="#facc15"/>
      <path d="M66 32 V26 C66 14 84 14 84 26 V32" fill="none" stroke="#3b5166" stroke-width="5" stroke-linecap="round"/>
      <text x="75" y="89" text-anchor="middle" font-size="18" font-weight="800" fill="#172033">Secrets</text>
      <text x="75" y="110" text-anchor="middle" font-size="13" fill="#627184">Credentials</text>
    </g>
  </g>

  <g stroke="#3b5166" stroke-width="3" stroke-linecap="round" fill="none" marker-end="url(#arrow)">
    <path d="M390 350 H422"/>
    <path d="M584 350 H614"/>
    <path d="M776 350 H806"/>
    <path d="M968 350 H998"/>
    <path d="M505 476 V432" stroke-dasharray="8 8"/>
  </g>

  <g transform="translate(453 166)" filter="url(#shadow)">
    <rect width="680" height="70" rx="8" fill="#ffffff" stroke="#cbd7e3" stroke-width="2"/>
    <text x="34" y="44" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800" fill="#172033">Pipeline Plugin</text>
    <text x="220" y="44" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#627184">runs Jenkinsfile stages as repeatable CI/CD</text>
    <circle cx="618" cy="35" r="18" fill="#d33832"/>
    <path d="M608 35 h20 M618 25 v20" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
